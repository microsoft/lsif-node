# no PR triggers
pr: none
trigger: none

schedules:
- cron: "0 0 * * *"
  displayName: Daily midnight test repositories validation
  branches:
    include:
    - main

pool:
  vmImage: 'ubuntu-20.04'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '22.14.0'
  displayName: 'Use Node.js 22.14.0'

- script: |
    npm ci
  displayName: 'Install dependencies'

- script: |
    npm run symlink
  displayName: 'Symlink node modules'

- script: |
    npm run compile
  displayName: 'Compile client'

- script: |
    node ./build/bin/testConfigs.js ./configs
  displayName: 'Running repository tests'
